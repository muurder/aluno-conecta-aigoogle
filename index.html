<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
    <title>Student Portal</title>
    <style>
      :root {
        --primary: #2563eb;
        --on-primary: #ffffff;
        --secondary: #10b981;
        --on-secondary: #ffffff;
        --background: #f1f5f9;
        --surface: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --accent: #3b82f6;
      }
      @supports not (height: 100dvh) {
        .h-\[100dvh\] {
          height: 100vh !important;
        }
        .min-h-\[100dvh\] {
          min-height: 100vh !important;
        }
      }
    </style>
  </head>
  <body class="bg-[var(--background)] text-[var(--text)]">
    <div id="root"></div>
    <script>
      (function() {
        var errorRoot = document.createElement('div');
        errorRoot.id = 'global-error-root';
        errorRoot.style.cssText = 'display:none;position:fixed;left:0;right:0;top:0;bottom:0;z-index:99999;background:#111827;color:#f9fafb;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;font-size:12px;line-height:1.5;padding:16px;';
        document.body.appendChild(errorRoot);
        function showGlobalError(title, message, detail) {
          document.getElementById('root').style.display = 'none';
          errorRoot.style.display = 'block';
          errorRoot.innerHTML = '<div style="max-width:720px;margin:0 auto;"><div style="color:#ef4444;font-size:16px;font-weight:bold;margin-bottom:8px;">' + title + '</div>' +
            '<div style="margin-bottom:8px;word-break:break-word;">' + message + '</div>' +
            (detail ? '<pre style="color:#e5e7eb;background:#00000033;padding:10px;border-radius:8px;overflow:auto;max-height:55vh;white-space:pre-wrap;">' + detail + '</pre>' : '') +
            '<button id="global-error-reload" style="margin-top:12px;padding:8px 12px;background:#2563eb;color:#fff;border:0;border-radius:8px;font-size:12px;">Recarregar</button>' +
            '<div id="global-error-ref" style="margin-top:10px;color:#9ca3af;font-size:11px;"></div></div>';
          document.getElementById('global-error-reload').addEventListener('click', function() { location.reload(); });
        }
        window.addEventListener('error', function(event) {
          var msg = event.message || 'Erro desconhecido';
          var detail = event.error && event.error.stack ? event.error.stack : (event.filename ? event.filename + ':' + event.lineno : '');
          showGlobalError('Erro global', msg, detail);
        }, true);
        window.addEventListener('unhandledrejection', function(event) {
          var reason = event.reason;
          var msg = (reason && reason.message) ? reason.message : String(reason);
          var detail = (reason && reason.stack) ? reason.stack : '';
          showGlobalError('Promise rejeitada', msg, detail);
        }, true);
      })();
    </script>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
