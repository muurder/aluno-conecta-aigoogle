<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
    <title>Student Portal</title>
    <style>
      :root {
        --primary: #2563eb;
        --on-primary: #ffffff;
        --secondary: #10b981;
        --on-secondary: #ffffff;
        --background: #f1f5f9;
        --surface: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --accent: #3b82f6;
      }
      @supports not (height: 100dvh) {
        .h-\[100dvh\] {
          height: 100vh !important;
        }
        .min-h-\[100dvh\] {
          min-height: 100vh !important;
        }
      }
    </style>
  </head>
  <body class="bg-[var(--background)] text-[var(--text)]">
    <div id="root"></div>
    <script>
      (function() {
        var root = document.getElementById('root');
        if (!root) return;

        function esc(str) {
          if (str == null) return '';
          return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
        }

        function show(title, msg, detail, isReject) {
          title = title || (isReject ? 'Promise rejeitada' : 'Erro global');
          detail = detail || '';
          var html = '<div style="position:fixed;inset:0;background:#111827;color:#f9fafb;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,Liberation Mono,Courier New,monospace;font-size:12px;line-height:1.5;padding:16px;z-index:999999;overflow:auto;-webkit-overflow-scrolling:touch">' +
            '<div style="color:#ef4444;font-size:18px;font-weight:bold;margin-bottom:10px;">' + esc(title) + '</div>' +
            '<div style="color:#fbbf24;font-weight:bold;margin-bottom:6px;word-break:break-word;">' + esc(msg) + '</div>';
          if (detail) {
            html += '<pre style="color:#e5e7eb;background:#00000044;padding:12px;border-radius:8px;overflow:auto;max-height:60vh;white-space:pre-wrap;word-break:break-word;font-size:11px;margin-bottom:10px;">' + esc(detail) + '</pre>';
          }
          html += '<button id="g-reload" style="padding:10px 16px;background:#2563eb;color:#fff;border:0;border-radius:8px;font-size:14px;-webkit-appearance:none;">Recarregar</button></div>';
          root.style.display = 'none';
          document.body.insertAdjacentHTML('afterbegin', html);
          document.getElementById('g-reload').addEventListener('click', function() { location.reload(); });
        }

        window.addEventListener('error', function(event) {
          var msg = event.message || '';
          var detail = '';
          if (event.error) {
            detail = event.error.stack || event.error.message || '';
          } else if (event.filename) {
            detail = event.filename + ':' + event.lineno + ':' + event.colno;
          }
          show('Erro global', msg || 'Erro desconhecido', detail, false);
        }, true);

        window.addEventListener('unhandledrejection', function(event) {
          var reason = event.reason;
          var msg = (reason && reason.message) ? reason.message : String(reason);
          var detail = (reason && reason.stack) ? reason.stack : '';
          show('Promise rejeitada', msg, detail, true);
        }, true);
      })();
    </script>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
